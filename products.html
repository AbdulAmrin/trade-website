<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View our product catalog: Premium Basmati rice, high-protein pulses, and value-added processed food items available for wholesale global export.">
    <title>Products | Basmati Rice, Pulses, & Spices | Sameetha International</title>
    <style>
        :root { --bg: #030a14; --gold: #dfb76c; --text: #f4f7fa; --card-bg: #0a1626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header-wrapper { background: var(--card-bg); border-bottom: 2px solid var(--gold); padding: 20px 0; }
        .nav { max-width: 1000px; margin: 0 auto; display: flex; justify-content: center; gap: 40px; }
        .nav a { color: var(--gold); text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .main-content { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--gold); text-align: center; }
        .card img { width: 100%; height: 220px; object-fit: cover; border: 1px solid var(--gold); margin-bottom: 15px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
    <main class="main-content">
        <div class="grid">
            <div class="card">
                <img src="basmati.jpg" alt="Premium Aged Basmati Rice">
                <h3>Premium Basmati Rice</h3>
                <p>Authentic, long-grain Basmati sourced from prime regions.</p>
            </div>
            <div class="card">
                <img src="pulses_legumes.jpg" alt="High-Protein Pulses and Legumes">
                <h3>Pulses & Legumes</h3>
                <p>High-protein lentils and beans cleaned to purity standards.</p>
            </div>
            <div class="card">
                <img src="processed_food.jpg" alt="Ready-to-cook Processed Food">
                <h3>Processed Food Items</h3>
                <p>Value-added traditional staples for global retail.</p>
            </div>
        </div>
    </main>
</body>
</html>
