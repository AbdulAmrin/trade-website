<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact the Sameetha International trade desk for global export inquiries, B2B wholesale orders, and logistics support.">
    <title>Contact Us | Sameetha International Trade Desk</title>
    <style>
        :root { --bg: #030a14; --gold: #dfb76c; --text: #f4f7fa; --card-bg: #0a1626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Forces the scrollbar to be visible always, preventing header jump */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow-y: scroll; 
        }

        /* SYNCED HEADER */
        .header-wrapper { background: var(--card-bg); border-bottom: 2px solid var(--gold); padding: 20px 0; }
        .nav { max-width: 1000px; margin: 0 auto; display: flex; justify-content: center; gap: 40px; }
        .nav a { color: var(--gold); text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }

        /* CONTACT CONTENT */
        .main-content { padding: 80px 20px; text-align: center; max-width: 800px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #fff; }
        .btn { display: inline-block; padding: 15px 30px; margin: 15px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: var(--bg); }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>

    <main class="main-content">
        <h1>Contact Our Trade Desk</h1>
        <p style="margin-bottom: 40px;">For bulk export inquiries, partnership opportunities, and shipping logistics.</p>
        
        <a href="mailto:contact@sameethainternational.com" class="btn">Email Us</a>
        <a href="https://wa.me/971503083292" target="_blank" class="btn">WhatsApp Chat</a>
    </main>
</body>
</html>
